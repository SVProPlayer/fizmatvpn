proxies:
  - name: "Подписка отключена"
    type: vless
    server: 127.0.0.1
    port: 443
    uuid: perez
    udp: true
    tls: true
    servername: www.vk.com
    flow: xtls-rprx-vision
    client-fingerprint: qq
    reality-opts:
      public-key: just-a-sign
  - name: "Новая ссылка в ЛС"
    type: vless
    server: 127.0.0.1
    port: 443
    uuid: perez
    udp: true
    tls: true
    servername: www.vk.com
    flow: xtls-rprx-vision
    client-fingerprint: qq
    reality-opts:
      public-key: just-a-sign

proxy-groups:
  - name: VPN
    type: select
    proxies:
      - "Подписка отключена"
      - "Новая ссылка в ЛС"

rules:
  - MATCH,VPN